<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кристаллик — Склад</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }
  .header { background: #1a1a2e; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header .subtitle { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  .sync-btn { background: #4CAF50; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .sync-btn:hover { background: #45a049; }
  .sync-btn:disabled { background: #888; cursor: default; }
  .rate-block { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 8px; }
  .rate-block label { font-size: 13px; opacity: 0.8; }
  .rate-block input { width: 70px; padding: 4px 8px; border-radius: 6px; border: none; font-size: 14px; font-weight: 600; text-align: center; }
  .rate-block button { background: #3498db; color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .kpi-card .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-card .value { font-size: 26px; font-weight: 700; margin-top: 6px; }
  .kpi-card .sub { font-size: 12px; color: #888; margin-top: 4px; }
  .kpi-card.green .value { color: #2ecc71; }
  .kpi-card.red .value { color: #e74c3c; }
  .kpi-card.blue .value { color: #3498db; }
  .kpi-card.orange .value { color: #e67e22; }
  .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #333; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; border: none; background: #f0f2f5; color: #666; font-weight: 500; }
  .tab.active { background: #1a1a2e; color: white; }
  .search-bar { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #f8f9fa; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e0e0e0; white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
  tr:hover td { background: #fafafa; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge.green { background: #e8f8f0; color: #2ecc71; }
  .badge.yellow { background: #fef9e7; color: #e67e22; }
  .badge.red { background: #fdecea; color: #e74c3c; }
  .loading { text-align: center; padding: 40px; color: #888; }
  .updated { font-size: 12px; color: #aaa; }
  @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>💎 Кристаллик — Склад</h1>
    <div class="subtitle updated" id="updated">Загрузка...</div>
  </div>
  <div class="rate-block">
    <label>💱 Курс $:</label>
    <input type="number" id="rate-input" step="0.1" min="1" value="41.5" />
    <button onclick="saveRate()">Сохранить</button>
  </div>
  <button class="sync-btn" onclick="syncData()">🔄 Синхронизировать</button>
</div>

<div class="container">
  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpi-grid">
    <div class="loading">Загрузка...</div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="card">
      <h3>📈 Продажи по дням</h3>
      <canvas id="salesChart" height="100"></canvas>
    </div>
    <div class="card">
      <h3>🏆 Топ товаров</h3>
      <canvas id="topChart" height="200"></canvas>
    </div>
  </div>

  <!-- Tables -->
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="showTab('stock')">📦 Склад</button>
      <button class="tab" onclick="showTab('orders')">🛒 Заказы</button>
      <button class="tab" onclick="showTab('expenses')">🧾 Расходы</button>
      <button class="tab" onclick="showTab('movements')">📋 Движения</button>
    </div>

    <!-- Stock -->
    <div id="tab-stock">
      <input class="search-bar" placeholder="Поиск товара..." oninput="filterStock(this.value)" />
      <div id="stock-table"><div class="loading">Загрузка...</div></div>
    </div>

    <!-- Orders -->
    <div id="tab-orders" style="display:none">
      <div id="orders-table"><div class="loading">Загрузка...</div></div>
    </div>

    <!-- Expenses -->
    <div id="tab-expenses" style="display:none">
      <div id="expenses-table"><div class="loading">Загрузка...</div></div>
    </div>

    <!-- Movements -->
    <div id="tab-movements" style="display:none">
      <div id="movements-table"><div class="loading">Загрузка...</div></div>
    </div>
  </div>
</div>

<script>
const CUR = "{{ currency }}";
let salesChart, topChart, allStock = [];

function fmt(n) { return CUR + Number(n || 0).toFixed(2); }

async function loadDashboard() {
  const d = await fetch("/api/dashboard").then(r => r.json());
  const k = d.kpi;

  document.getElementById("updated").textContent = "Обновлено: " + new Date().toLocaleTimeString("ru");

  document.getElementById("kpi-grid").innerHTML = `
    <div class="kpi-card green"><div class="label">Выручка</div><div class="value">${fmt(k.revenue)}</div><div class="sub">${k.orders} заказов</div></div>
    <div class="kpi-card ${k.profit >= 0 ? 'green' : 'red'}"><div class="label">Прибыль</div><div class="value">${fmt(k.profit)}</div><div class="sub">Маржа ${k.margin}%</div></div>
    <div class="kpi-card blue"><div class="label">Себестоимость</div><div class="value">${fmt(k.cogs)}</div></div>
    <div class="kpi-card orange"><div class="label">Расходы</div><div class="value">${fmt(k.expenses)}</div></div>
    <div class="kpi-card blue"><div class="label">Сумма на складе</div><div class="value">${fmt(k.stock_value)}</div></div>
    <div class="kpi-card ${k.out_of_stock > 0 ? 'red' : 'green'}"><div class="label">Нет в наличии</div><div class="value">${k.out_of_stock}</div><div class="sub">⚠️ Мало: ${k.low_stock}</div></div>
  `;

  // Sales chart
  if (salesChart) salesChart.destroy();
  salesChart = new Chart(document.getElementById("salesChart"), {
    type: "line",
    data: {
      labels: d.daily_sales.labels,
      datasets: [{ label: "Продажи", data: d.daily_sales.values, borderColor: "#3498db", backgroundColor: "rgba(52,152,219,0.1)", fill: true, tension: 0.4 }]
    },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });

  // Top products chart
  if (topChart) topChart.destroy();
  topChart = new Chart(document.getElementById("topChart"), {
    type: "bar",
    data: {
      labels: d.top_products.labels,
      datasets: [{ label: "Выручка", data: d.top_products.revenue, backgroundColor: "#1a1a2e" }]
    },
    options: { indexAxis: "y", plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }
  });
}

async function loadStock() {
  allStock = await fetch("/api/stock").then(r => r.json());
  renderStock(allStock);
}

function renderStock(data) {
  if (!data.length) { document.getElementById("stock-table").innerHTML = "<div class='loading'>Склад пуст</div>"; return; }
  let rows = data.map(p => {
    const qty = p.stock_qty || 0;
    const costUsd = p.cost_price_usd || 0;
    const costUah = p.cost_price_uah || 0;
    const sellUsd = p.sell_price_usd || 0;
    const sellUah = p.sell_price_uah || 0;
    const margin = sellUsd && costUsd ? Math.round((sellUsd - costUsd) / sellUsd * 100) : 0;
    const badge = qty === 0 ? '<span class="badge red">0</span>' : qty <= 3 ? `<span class="badge yellow">${qty}</span>` : `<span class="badge green">${qty}</span>`;
    const costCell = costUsd ? `$${costUsd} / ₴${costUah}` : '<span style="color:#ccc">—</span>';
    const sellCell = sellUah ? `$${sellUsd} / ₴${sellUah}` : '<span style="color:#ccc">—</span>';
    return `<tr>
      <td>${p.name}</td>
      <td>${p.sku||''}</td>
      <td>${badge}</td>
      <td>${costCell}</td>
      <td>${sellCell}</td>
      <td>${costUsd ? margin+'%' : '—'}</td>
      <td>${costUsd ? '$'+((costUsd*qty).toFixed(2)) : '—'}</td>
    </tr>`;
  }).join("");
  document.getElementById("stock-table").innerHTML = `<table><thead><tr>
    <th>Название</th><th>Артикул</th><th>Остаток</th>
    <th>Цена прихода ($/₴)</th><th>Цена продажи ($/₴)</th>
    <th>Маржа</th><th>Сумма склада</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function filterStock(q) {
  renderStock(q ? allStock.filter(p => (p.name||"").toLowerCase().includes(q.toLowerCase())) : allStock);
}

async function loadOrders() {
  const data = await fetch("/api/orders").then(r => r.json());
  if (!data.length) { document.getElementById("orders-table").innerHTML = "<div class='loading'>Нет заказов</div>"; return; }
  let rows = data.map(o => `<tr><td>#${o.site_order_id}</td><td>${(o.order_date||"").slice(0,10)}</td><td>${fmt(o.total_amount)}</td><td>${o.customer_name||''}</td><td><span class="badge green">${o.status||''}</span></td></tr>`).join("");
  document.getElementById("orders-table").innerHTML = `<table><thead><tr><th>№</th><th>Дата</th><th>Сумма</th><th>Покупатель</th><th>Статус</th></tr></thead><tbody>${rows}</tbody></table>`;
}

async function loadExpenses() {
  const data = await fetch("/api/expenses").then(r => r.json());
  if (!data.length) { document.getElementById("expenses-table").innerHTML = "<div class='loading'>Нет расходов</div>"; return; }
  let rows = data.map(e => `<tr><td>${e.expense_date||''}</td><td>${e.category||''}</td><td>${e.description||''}</td><td>${fmt(e.amount)}</td></tr>`).join("");
  document.getElementById("expenses-table").innerHTML = `<table><thead><tr><th>Дата</th><th>Категория</th><th>Описание</th><th>Сумма</th></tr></thead><tbody>${rows}</tbody></table>`;
}

async function loadMovements() {
  const data = await fetch("/api/movements").then(r => r.json());
  if (!data.length) { document.getElementById("movements-table").innerHTML = "<div class='loading'>Нет движений</div>"; return; }
  let rows = data.map(m => {
    const icon = m.type === 'in' ? '📥' : m.type === 'out' ? '📤' : '📝';
    return `<tr><td>${(m.created_at||"").slice(0,16).replace("T"," ")}</td><td>${icon} ${m.type}</td><td>${m.product_name||''}</td><td>${m.qty}</td><td>${fmt(m.cost_price)}</td><td>${m.order_id||m.invoice_id||''}</td></tr>`;
  }).join("");
  document.getElementById("movements-table").innerHTML = `<table><thead><tr><th>Дата</th><th>Тип</th><th>Товар</th><th>Кол-во</th><th>Цена</th><th>Источник</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function showTab(name) {
  ["stock","orders","expenses","movements"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t === name ? "" : "none";
    document.querySelectorAll(".tab")[["stock","orders","expenses","movements"].indexOf(t)].classList.toggle("active", t === name);
  });
  if (name === "orders") loadOrders();
  if (name === "expenses") loadExpenses();
  if (name === "movements") loadMovements();
}

async function syncData() {
  const btn = document.querySelector(".sync-btn");
  btn.disabled = true; btn.textContent = "⏳ Синхронизация...";
  try {
    await loadDashboard();
    await loadStock();
    btn.textContent = "✅ Готово";
    setTimeout(() => { btn.disabled = false; btn.textContent = "🔄 Синхронизировать"; }, 2000);
  } catch(e) {
    btn.textContent = "❌ Ошибка"; btn.disabled = false;
  }
}

async function saveRate() {
  const rate = parseFloat(document.getElementById("rate-input").value);
  if (!rate || rate < 1) return alert("Введи корректный курс");
  await fetch("/api/rate", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({rate})});
  await loadStock();
  document.querySelector(".rate-block button").textContent = "✅ Сохранено";
  setTimeout(() => document.querySelector(".rate-block button").textContent = "Сохранить", 2000);
}

async function loadRate() {
  const d = await fetch("/api/rate").then(r => r.json());
  document.getElementById("rate-input").value = d.rate;
}

// Init
loadRate();
loadDashboard();
loadStock();
</script>
</body>
</html>
