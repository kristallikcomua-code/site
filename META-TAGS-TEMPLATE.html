     NOTES FOR IMPLEMENTATION
     ============================================

1. TITLE BEST PRACTICES:

2. META DESCRIPTION:
   - 150-160 символів (оптимально 155)
   - CTA (call-to-action)
   - Включай ключові слова
   - Перші 120 символів видно у результатах

3. OPEN GRAPH:
   - og:title - може відрізнятися від <title>
   - og:image - мінімум 1200x630px
   - og:url - абсолютний URL (з https://)
   - og:type - product, website, article

4. STRUCTURED DATA:
   - Валідуй на schema.org/validator
   - Додавай imageObject для кращих результатів
   - Включай aggregateRating якщо є

5. BREADCRUMB:
   - Допомагає SEO
   - Покращує UX
   - З'являється у результатах пошуку

6. ROBOTS:
   - index = сторінка індексується
   - follow = посилання стежаться
   - max-snippet = довжина опису
   - max-image-preview = розмір зображення

============================================ -->
